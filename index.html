<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>夏夜ゆかた帖 | mirror-yukata</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <p class="eyebrow">mirror-yukata</p>
        <h1 id="app-title">夏夜ゆかた帖</h1>
        <p class="lead">
          浴衣・帯・小物・キモノアレンジを選んで、パートナーに見せるための浴衣コーデオーダーカードを作るWebアプリです。
        </p>
      </section>

      <section class="builder" aria-label="浴衣コーデ選択">
        <div class="controls">
          <label>
            衣装タイプ
            <select id="styleType"></select>
          </label>

          <label>
            浴衣カラー
            <select id="yukataColor"></select>
          </label>

          <label>
            柄
            <select id="pattern"></select>
          </label>

          <label>
            帯
            <select id="obi"></select>
          </label>

          <label>
            小物
            <select id="item"></select>
          </label>

          <label id="arrangeLabel">
            キモノアレンジ
            <select id="arrange"></select>
          </label>
        </div>

        <article class="coord-card" aria-live="polite">
          <p class="card-kicker">浴衣コーデオーダーカード</p>
          <div class="visual-preview" aria-label="浴衣プレビュー">
          <div class="yukata-preview-wrapper">
            <div id="yukataBodyFillPreview" class="yukata-layer yukata-fill-layer" aria-hidden="true"></div>
            <div id="yukataObiFillPreview" class="yukata-layer yukata-fill-layer" aria-hidden="true"></div>
            <img id="yukataBodyPreview" class="yukata-layer yukata-line-layer" src="" alt="" />
            <img id="yukataObiPreview" class="yukata-layer yukata-line-layer" src="" alt="" />
         </div>
            <p id="previewCaption" class="preview-caption"></p>
          </div>
          <h2 id="coordName"></h2>
          <p id="coordDescription"></p>

          <div class="chips" id="colorChips"></div>

          <dl class="details" id="coordDetails"></dl>

          <div class="order-box">
            <p class="order-title">生成オーダー</p>
            <p id="orderText"></p>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
